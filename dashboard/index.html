<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PuzzleChess Benchmark</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    #loading { display: none; text-align: center; padding: 60px; color: var(--text-muted); font-size: 14px; }
    .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- ── Hero ── -->
<div class="hero">
  <div class="container">
    <div class="hero-inner">
      <div>
        <h1>Puzzle<span>Chess</span> Benchmark</h1>
        <p>Evaluating LLM chess puzzle performance across difficulty tiers and mate types</p>
      </div>
      <div class="chips">
        <span class="chip"><strong>300</strong> puzzles</span>
        <span class="chip" id="chip-models"><strong>—</strong> models</span>
        <span class="chip"><strong>5</strong> mate types</span>
        <span class="chip"><strong>4</strong> difficulty tiers</span>
      </div>
    </div>
  </div>
</div>

<!-- ── Tabs ── -->
<div class="container">
  <div class="tabs-bar" id="tabs-bar"></div>

  <div id="loading">
    <div class="spinner"></div>
    Fetching results from S3...
  </div>

  <div id="panels"></div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
